name: Build custom TKG AI image

on:
  push:
    branches:
      - custom-ai-names
    paths:
      - Dockerfile.custom-ai
      - Start.ps1
      - server_config.xml
      - patches/**
      - scripts/Start-WindowsDocker.ps1
      - .github/workflows/build-custom-ai-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Build this branch-only Windows image in GitHub Actions.
    runs-on: windows-2022
    steps:
      - name: Check out custom image branch
        uses: actions/checkout@v4

      - name: Start and verify Windows Docker daemon
        shell: powershell
        run: ./scripts/Start-WindowsDocker.ps1

      - name: Sign in to GitHub Container Registry
        shell: powershell
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GHCR_PAT)) {
            throw 'Add an Actions repository secret named GHCR_PAT containing a GitHub classic personal access token with write:packages and read:packages permissions. Include repo permission when this repository or package is private.'
          }
          $env:GHCR_PAT | docker login ghcr.io --username "twistedbobross" --password-stdin

      - name: Build the separate custom image
        shell: powershell
        run: |
          docker build --isolation=process `
            --file Dockerfile.custom-ai `
            --tag ghcr.io/twistedbobross/supertuxkart-gsa-windows:custom-ai-names `
            --tag ghcr.io/twistedbobross/supertuxkart-gsa-windows:custom-ai-names-${{ github.sha }} `
            .

      - name: Publish the custom image tags
        shell: powershell
        run: |
          docker push ghcr.io/twistedbobross/supertuxkart-gsa-windows:custom-ai-names
          docker push ghcr.io/twistedbobross/supertuxkart-gsa-windows:custom-ai-names-${{ github.sha }}
