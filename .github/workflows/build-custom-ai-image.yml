name: Build custom TKG AI image

on:
  push:
    branches:
      - custom-ai-names
    paths:
      - Dockerfile.custom-ai
      - Start.ps1
      - server_config.xml
      - patches/**
      - scripts/**
      - blueprints/supertuxkart-gsa-windows-custom-ai-names.json
      - .github/workflows/build-custom-ai-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Build this branch-only Windows image in GitHub Actions.
    runs-on: windows-2022
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: twistedbobross/supertuxkart-gsa-windows-custom-ai
    steps:
      - name: Check out custom image branch
        uses: actions/checkout@v4

      - name: Start and verify Windows Docker daemon
        shell: powershell
        run: ./scripts/Start-WindowsDocker.ps1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the separate custom image
        shell: powershell
        run: |
          docker build --isolation=process `
            --file Dockerfile.custom-ai `
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.5-tkg-ai-names `
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.5-tkg-ai-names-${{ github.sha }} `
            .

      - name: Publish the separate custom image
        shell: powershell
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.5-tkg-ai-names
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:1.5-tkg-ai-names-${{ github.sha }}
