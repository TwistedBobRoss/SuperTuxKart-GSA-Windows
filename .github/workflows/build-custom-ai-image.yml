name: Build custom TKG AI image

on:
  push:
    branches:
      - custom-ai-names
    paths:
      - Dockerfile.custom-ai
      - Start.ps1
      - server_config.xml
      - patches/**
      - .github/workflows/build-custom-ai-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # GitHub-hosted Windows runners expose the Docker CLI but do not provide
    # the Windows-container Docker daemon required by servercore:ltsc2022.
    # Register a self-hosted Windows runner with these labels on the machine
    # that has Docker configured for Windows containers.
    runs-on: [self-hosted, windows, x64, windows-containers]
    steps:
      - name: Check out custom image branch
        uses: actions/checkout@v4

      - name: Verify Windows-container Docker daemon
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          docker version
          $osType = docker info --format '{{.OSType}}'
          if ($osType -ne 'windows') {
            throw "This runner is using '$osType' containers. Switch Docker to Windows containers before running this custom image build."
          }
          docker info --format 'Docker daemon OS type: {{.OSType}}'

      - name: Sign in to GitHub Container Registry
        shell: powershell
        run: |
          $env:GITHUB_TOKEN | docker login ghcr.io -u $env:GITHUB_ACTOR --password-stdin

      - name: Build the separate custom image
        shell: powershell
        run: |
          docker build --isolation=process `
            --file Dockerfile.custom-ai `
            --tag ghcr.io/${{ github.repository_owner }}/supertuxkart-gsa-windows:custom-ai-names `
            --tag ghcr.io/${{ github.repository_owner }}/supertuxkart-gsa-windows:custom-ai-names-${{ github.sha }} `
            .

      - name: Publish the custom image tags
        shell: powershell
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/supertuxkart-gsa-windows:custom-ai-names
          docker push ghcr.io/${{ github.repository_owner }}/supertuxkart-gsa-windows:custom-ai-names-${{ github.sha }}
